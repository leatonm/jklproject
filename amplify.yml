# AWS Amplify Hosting — Gen 2 fullstack
# Use `npm ci --ignore-scripts` so postinstall does not run before amplify_outputs.json exists.
# Frontend pulls config with `ampx generate outputs` after the backend phase deploys.
version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline --ignore-scripts
        - export CI=1
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline --ignore-scripts
        - export CI=1
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
