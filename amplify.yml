# AWS Amplify Hosting — Gen 2 fullstack
# Use `npm install` (not `npm ci`): Amplify/CDK nested + bundled deps can leave the lockfile
# in a state `npm ci` rejects ("Missing: … from lock file") even after a local `npm install`.
# `--ignore-scripts` keeps postinstall from running before amplify_outputs.json exists.
# Frontend pulls config with `ampx generate outputs` after the backend phase deploys.
version: 1
backend:
  phases:
    build:
      commands:
        - npm install --cache .npm --prefer-offline --ignore-scripts
        - export CI=1
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install --cache .npm --prefer-offline --ignore-scripts
        - export CI=1
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
